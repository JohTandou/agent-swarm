<section class="not-found">
  <img src="/assets/images/not-found-hex.png" alt="" class="not-found__illustration" aria-hidden="true" loading="lazy" fetchpriority="low" />
  <div class="not-found__content">
    <h1 class="not-found__code">404</h1>
    <p class="not-found__message">
      {{ t('notfound.message') }}
    </p>
    <nav class="not-found__actions" [attr.aria-label]="t('search.button')">
      <app-ui-button variant="accent" size="lg" routerLink="/">{{ t('notfound.home') }}</app-ui-button>
      <app-ui-button variant="outline" size="lg" routerLink="/agents">{{ t('notfound.agents') }}</app-ui-button>
    </nav>
    <p class="not-found__credit">
      {{ t('notfound.credit') }}
    </p>
  </div>
</section>

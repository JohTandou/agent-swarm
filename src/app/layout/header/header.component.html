<header class="header" role="banner">
  <div class="header__inner">
    <!-- Brand -->
    <a routerLink="/" class="header__brand" aria-label="Swarm Wiki — Accueil">
      <span class="header__brand-text">Swarm Wiki</span>
    </a>

    <!-- Navigation primaire desktop -->
    @if (!isMobile) {
      <nav class="header__nav" aria-label="Navigation principale">
        <a routerLink="/" class="header__nav-link" routerLinkActive="header__nav-link--active" [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">
          Accueil
        </a>
        <a routerLink="/a-propos" class="header__nav-link" routerLinkActive="header__nav-link--active" ariaCurrentWhenActive="page">
          À propos
        </a>
      </nav>
    }

    <!-- Actions desktop -->
    @if (!isMobile) {
      <div class="header__actions">
        <app-ui-button variant="ghost" size="md" (click)="onSearchClick()" aria-label="Rechercher (Cmd+K)" title="Rechercher (Cmd+K)">
          <svg class="header__search-icon" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16ZM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="header__search-text">Rechercher</span>
          <kbd class="header__search-kbd">⌘K</kbd>
        </app-ui-button>
      </div>
    }

    <!-- Actions mobile -->
    @if (isMobile) {
      <div class="header__actions">
        <app-ui-button variant="icon" size="md" (click)="onSearchClick()" aria-label="Rechercher">
          <svg class="header__search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16ZM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </app-ui-button>
        <button
          type="button"
          class="header__hamburger-btn"
          [class.header__hamburger--open]="sidebarOpen"
          (click)="onToggleSidebar()"
          [attr.aria-label]="sidebarOpen ? 'Fermer le menu' : 'Ouvrir le menu'"
          [attr.aria-expanded]="sidebarOpen"
        >
          <span class="header__hamburger-bar"></span>
          <span class="header__hamburger-bar"></span>
          <span class="header__hamburger-bar"></span>
        </button>
      </div>
    }
  </div>
</header>

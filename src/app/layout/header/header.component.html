<header class="header" role="banner">
  <div class="header__inner">
    <!-- Groupe gauche : hamburger + brand + avatar -->
    <div class="header__left">
      <!-- Bouton sidebar — desktop ET mobile -->
      <button
        type="button"
        class="header__sidebar-btn"
        [class.header__sidebar-btn--open]="sidebarOpen"
        (click)="onToggleSidebar()"
        [attr.aria-label]="sidebarOpen ? t('header.sidebar.close') : t('header.sidebar.open')"
        [attr.aria-expanded]="sidebarOpen"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <!-- Brand -->
      <a routerLink="/" class="header__brand" [attr.aria-label]="t('header.brand.ariaLabel')">
        <img
          class="header__brand-logo"
          src="/assets/images/bee-logo-48.png"
          alt="Swarm"
          width="18"
          height="18"
        />
        <span class="header__brand-text">Swarm Wiki</span>
      </a>
    </div>

    <!-- Navigation primaire desktop -->
    @if (!isMobile) {
      <nav class="header__nav" [attr.aria-label]="t('header.nav.main')">
        <a routerLink="/" class="header__nav-link" routerLinkActive="header__nav-link--active" [routerLinkActiveOptions]="{ exact: true }" ariaCurrentWhenActive="page">
          {{ t('nav.home') }}
        </a>
        <a [routerLink]="aboutRoute" class="header__nav-link" routerLinkActive="header__nav-link--active" ariaCurrentWhenActive="page">
          {{ langService.currentLang() === 'fr' ? 'À propos' : 'About' }}
        </a>
      </nav>
    }

    <!-- Actions droite -->
    <div class="header__actions">
      <!-- Language switcher FR/EN -->
      <button
        class="header__lang-switch"
        (click)="toggleLang()"
        [attr.aria-label]="langService.currentLang() === 'fr' ? t('nav.switchToEn') : t('nav.switchToFr')"
        [attr.title]="langService.currentLang() === 'fr' ? t('nav.switchToEn') : t('nav.switchToFr')"
      >
        {{ langService.currentLang() === 'fr' ? t('lang.en') : t('lang.fr') }}
      </button>
      @if (!isMobile) {
        <app-ui-button variant="ghost" size="md" (click)="onSearchClick()" [attr.aria-label]="t('header.search.ariaLabel')" [attr.title]="t('header.search.ariaLabel')">
          <svg class="header__search-icon" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16ZM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="header__search-text">{{ t('header.search.text') }}</span>
          <kbd class="header__search-kbd">⌘K</kbd>
        </app-ui-button>
      }
      @if (isMobile) {
        <app-ui-button variant="icon" size="md" (click)="onSearchClick()" [attr.aria-label]="t('header.search.ariaLabel')">
          <svg class="header__search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16ZM19 19l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </app-ui-button>
      }
    </div>
  </div>
</header>

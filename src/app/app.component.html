<!-- Lien d'accès rapide — accessibilité clavier -->
<a href="#main-content" class="skip-to-content">Aller au contenu principal</a>

<!-- En-tête fixe glassmorphique -->
<app-header
  [isMobile]="isMobile()"
  [sidebarOpen]="sidebarOpen()"
  (toggleSidebar)="toggleSidebar()"
  (openSearch)="openSearch()"
/>

<!-- Layout 3 colonnes desktop / 1 colonne mobile -->
<div class="shell-layout" [class.shell-layout--sidebar-open]="isMobile() && sidebarOpen()">
  <!-- Sidebar gauche — masquée sur la page d'accueil -->
  @if (!isHomepage()) {
    @if (!isMobile()) {
      <app-sidebar class="shell-layout__sidebar" />
    } @else {
      <app-sidebar
        class="shell-layout__sidebar shell-layout__sidebar--overlay"
        [class.shell-layout__sidebar--open]="sidebarOpen()"
        [isMobile]="true"
        (closeSidebar)="closeSidebar()"
      />
    }
  }

  <!-- Overlay mobile pour fermer la sidebar au tap -->
  @if (isMobile() && sidebarOpen() && !isHomepage()) {
    <div
      class="sidebar-overlay"
      (click)="closeSidebar()"
      (keydown.escape)="closeSidebar()"
      role="presentation"
      tabindex="-1"
    ></div>
  }

  <!-- Contenu principal -->
  <main
    id="main-content"
    class="content-area"
    [class.content-area--homepage]="isHomepage()"
    tabindex="-1"
  >
    <!-- Fil d'Ariane — masqué sur la page d'accueil -->
    @if (!isHomepage()) {
      <app-breadcrumbs [breadcrumbs]="breadcrumbs()" />
    }

    <!-- TOC accordéon sur mobile -->
    @if (isMobile() && !isHomepage()) {
      <div class="toc-mobile">
        <app-ui-button variant="secondary" size="md" class="toc-mobile__toggle" (click)="toggleToc()" [attr.aria-expanded]="tocOpen()" aria-controls="toc-mobile-content">
          <span>Sur cette page</span>
          <span class="toc-mobile__chevron" [class.toc-mobile__chevron--open]="tocOpen()" aria-hidden="true">▼</span>
        </app-ui-button>
        @if (tocOpen()) {
          <div id="toc-mobile-content" class="toc-mobile__content">
            <app-table-of-contents />
          </div>
        }
      </div>
    }

    <!-- Zone de contenu dynamique avec transition de page GSAP -->
    <div
      #pageWrapper
      class="main-content page-transition"
      [class.main-content--homepage]="isHomepage()"
    >
      <router-outlet />
    </div>
  </main>

  <!-- Table des matières dynamique — desktop only, masquée sur homepage -->
  @if (!isMobile() && !isHomepage()) {
    <app-table-of-contents class="shell-layout__toc" />
  }
</div>

<!-- Notifications toast -->
<app-toaster />

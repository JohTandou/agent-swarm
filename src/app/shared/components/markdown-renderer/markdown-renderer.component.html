<article class="markdown-body" [attr.aria-label]="t('markdown.ariaLabel')">
  <!-- État de chargement -->
  @if (isLoading) {
    <div class="markdown-renderer__loading" aria-busy="true" [attr.aria-label]="t('markdown.loading')">
      <div class="markdown-renderer__progress"></div>
    </div>
  }

  <!-- État d'erreur -->
  @if (errorMessage) {
    <div class="markdown-error" role="alert">
      <p class="markdown-error__title">{{ t('markdown.error.title') }}</p>
      <p class="markdown-error__message">{{ errorMessage }}</p>
    </div>
  }

  <!-- État vide -->
  @if (!isLoading && !errorMessage && !processedContent) {
    <div class="markdown-empty">
      <p class="markdown-empty__text">{{ t('markdown.empty.title') }}</p>
      <p class="markdown-empty__hint">
        {{ t('markdown.empty.hint') }}
      </p>
    </div>
  }

  <!-- Contenu rendu -->
  @if (!isLoading && !errorMessage && processedContent) {
    <markdown
      [data]="processedContent"
      [mermaid]="false"
      [disableSanitizer]="true"
    />
  }
</article>

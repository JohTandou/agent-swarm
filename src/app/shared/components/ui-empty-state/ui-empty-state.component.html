<div class="ui-empty-state">
  <div class="ui-empty-state__illustration" aria-hidden="true">
    <svg viewBox="0 0 120 120" class="ui-empty-state__hex" xmlns="http://www.w3.org/2000/svg">
      <polygon
        points="60,10 110,35 110,85 60,110 10,85 10,35"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        class="ui-empty-state__hex-path"
      />
    </svg>
  </div>

  @if (title) {
    <h3 class="ui-empty-state__title">{{ title }}</h3>
  }
  @if (description) {
    <p class="ui-empty-state__description">{{ description }}</p>
  }

  <div class="ui-empty-state__actions">
    @if (primaryActionLabel) {
      <app-ui-button variant="primary" (click)="primaryAction.emit()">
        {{ primaryActionLabel }}
      </app-ui-button>
    }
    @if (secondaryActionLabel && secondaryActionRoute) {
      <a
        class="ui-empty-state__secondary"
        [routerLink]="secondaryActionRoute"
      >
        {{ secondaryActionLabel }}
        <span class="ui-empty-state__arrow" aria-hidden="true">→</span>
      </a>
    }
  </div>
</div>
